<head>
  <meta charset="UTF-8" />

  <meta property="og:title" content="TΞKΗ+ — L'échange intelligent d'appareils électroniques" />

    content="Échangez votre smartphone en toute simplicité : estimation rapide et transaction sécurisée." />

  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="/src/assets/logos/robott.jpeg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="/src/assets/logos/robott.jpeg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    /* Fond animé deep green + deep blue */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #064e3b 0%, #0a1628 40%, #064e3b 70%, #0c4a6e 100%);
      background-size: 400% 400%;
      animation: splashBgMove 12s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
      overflow: hidden;
    }
    #splash-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 120%, rgba(6, 78, 59, 0.6), transparent),
                  radial-gradient(ellipse 60% 40% at 80% 20%, rgba(10, 22, 40, 0.5), transparent),
                  radial-gradient(ellipse 50% 30% at 20% 80%, rgba(12, 74, 110, 0.4), transparent);
      animation: splashPulse 8s ease-in-out infinite;
      pointer-events: none;
    }
    .splash-logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      animation: splashFadeIn 0.5s ease-out forwards;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.15);
    }
    .splash-slogan {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.01em;
      line-height: 1.5;
      opacity: 0;
      text-transform: none;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
      animation: sloganReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      position: relative;
      z-index: 1;
      max-width: 90%;
    }
    .splash-slogan .highlight {
      color: #00FF41;
      font-weight: 900;
      text-shadow: 0 0 24px rgba(0, 255, 65, 0.5);
    }
    @keyframes splashBgMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes splashPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes splashFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes sloganReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body class="bg-background">
  <div id="splash-screen">
    <img src="/icon.jpeg" alt="TEKH+" class="splash-logo">
    <div class="splash-slogan">
      TΞKΗ<span class="highlight">+</span><br>
      <span style="font-size: 0.85rem; opacity: 0.9; font-weight: 600;">pour une <span class="highlight">inclusion
          numérique</span> de qualité pour tous</span>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('splash-hidden');
          setTimeout(() => splash.remove(), 400);
        }
      }, 2000);
    });
  </script>
  <script>
    // Ne plus désenregistrer le SW : en PWA le SW doit servir index.html pour toutes les routes
    // (évite 404 au rafraîchissement sur /deals, /simulateur, etc.)
  </script>
</body>

</html>
